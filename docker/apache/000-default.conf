<VirtualHost *:__PORT__>
    ServerName localhost
    DocumentRoot /var/www/html/public

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    <Directory /var/www/html>
        Require all denied
    </Directory>

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "^(\.env|composer\.(json|lock)|package(-lock)?\.json|artisan)$">
        Require all denied
    </FilesMatch>

    <LocationMatch "^/(storage/(app|framework|logs)|vendor|node_modules|bootstrap|config|database|resources|routes)(/|$)">
        Require all denied
    </LocationMatch>
</VirtualHost>
